<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AerUla Jaffna Heritage Village Map</title>
  <desc id="desc">A stylized top view village with huts, central courtyard, palm trees, paths, and lagoon water.</desc>
  <defs>
    <linearGradient id="skyGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7ddba"/>
      <stop offset="50%" stop-color="#efd6ad"/>
      <stop offset="100%" stop-color="#dcb98a"/>
    </linearGradient>
    <radialGradient id="ground" cx="50%" cy="52%" r="66%">
      <stop offset="0%" stop-color="#e5cb9d"/>
      <stop offset="100%" stop-color="#cbab7f"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ec4cc"/>
      <stop offset="100%" stop-color="#628994"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8d6b4a"/>
      <stop offset="100%" stop-color="#705137"/>
    </linearGradient>
    <style>
      .path { fill: none; stroke: #7f6444; stroke-opacity: 0.52; stroke-width: 8; stroke-dasharray: 14 12; }
      .fence { fill: none; stroke: #6e553a; stroke-width: 6; stroke-opacity: 0.7; }
      .hut-base { fill: #af8a61; }
      .hut-shadow { fill: #76573c; fill-opacity: 0.22; }
      .tree-trunk { fill: #6a4a2f; }
      .tree-top { fill: #396a41; }
      .tree-leaf { fill: #2f5d38; }
      .courtyard { fill: #d2ae7f; }
      .gate { fill: #6f4e34; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#skyGlow)"/>
  <ellipse cx="800" cy="860" rx="960" ry="490" fill="url(#ground)"/>

  <ellipse cx="800" cy="170" rx="680" ry="130" fill="#587966" opacity="0.72"/>
  <ellipse cx="800" cy="130" rx="760" ry="120" fill="url(#water)"/>
  <ellipse cx="800" cy="145" rx="700" ry="70" fill="#c8d8d0" opacity="0.22"/>

  <path class="fence" d="M120 312 Q800 250 1480 312"/>
